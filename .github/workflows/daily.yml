name: Daily AURA Brief

"on":
  schedule:
    # Beijing 09:00 is UTC 01:00.
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          python scripts/fetch_news.py
          python scripts/filter_candidates.py
          python scripts/analyze_deepseek.py
          python scripts/rank_select.py
          python scripts/build_site.py
          python scripts/push_bot.py

      - name: Git status
        run: git status --short

      - name: Commit and push updates
        run: |
          if [ -n "$(git status --short data docs)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data docs
            git commit -m "chore: update daily AURA brief"
            git push
          else
            echo "No data/ or docs/ changes to commit."
          fi
